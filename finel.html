<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday · Journey</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:      #1a1028;
            --card:    #1f1530;
            --border:  #3a2a50;
            --ink:     #e9e5dc;
            --muted:   #9a8ab0;
            --accent:  #c084fc;
            --accent2: #e9a8f0;
            --pink:    #ff6b9d;
            --r:       16px;
            --track:   2px;
        }

        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            color: var(--ink);
            font-family: 'Inter', system-ui, Arial, sans-serif;
            font-weight: 400;
            overflow: hidden;
            height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        body.unlocked {
            overflow-x: hidden;
            overflow-y: auto;
            height: auto;
        }

        /* ============ ROCKET INTRO SECTION ============ */
        .rocket-section {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #0a0a0c;
            font-family: 'Montserrat', 'Helvetica Neue', Arial, sans-serif;
            z-index: 50;
            opacity: 1;
            transform: scale(1);
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1), transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.5s;
        }

        .rocket-section.hidden {
            opacity: 0;
            transform: scale(1.06);
            visibility: hidden;
            pointer-events: none;
        }

        .page-content {
            display: none;
        }

        .page-content.shown {
            display: block;
            opacity: 0;
            transform: translateY(24px) scale(0.99);
        }

        .page-content.shown.entered {
            opacity: 1;
            transform: translateY(0) scale(1);
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1) 0.1s, transform 0.6s cubic-bezier(0.4, 0, 0.2, 1) 0.1s;
        }

        .rocket-section canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: transparent;
            touch-action: none;
        }

        .scroll-up {
            position: absolute;
            bottom: 6px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            z-index: 20;
            user-select: none;
            opacity: 0.7;
            transition: opacity 0.3s;
            cursor: pointer;
        }
        .scroll-up:hover {
            opacity: 1;
        }
        .mouse {
            width: 18px;
            height: 28px;
            border: 1.5px solid #8b5cf6;
            border-radius: 14px;
            position: relative;
            box-shadow: 0 0 12px rgba(139, 92, 246, 0.25);
            background: rgba(10, 10, 12, 0.2);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }
        .mouse::before {
            content: "";
            position: absolute;
            left: 50%;
            bottom: 6px;
            width: 3px;
            height: 7px;
            border-radius: 8px;
            background: #8b5cf6;
            transform: translateX(-50%);
            animation: wheelUp 1.6s infinite;
            box-shadow: 0 0 6px #8b5cf6;
        }
        @keyframes wheelUp {
            0%   { opacity: 1; transform: translate(-50%, 0); }
            70%  { opacity: 0; transform: translate(-50%, -12px); }
            100% { opacity: 0; transform: translate(-50%, -12px); }
        }
        .scroll-up .text {
            color: #8b5cf6;
            font-size: 8px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 400;
            text-shadow: 0 0 8px rgba(139, 92, 246, 0.2);
            background: rgba(10, 10, 12, 0.25);
            padding: 2px 8px;
            border-radius: 20px;
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            white-space: nowrap;
        }
        @media (max-width: 360px) {
            .scroll-up { bottom: 4px; gap: 2px; }
            .mouse { width: 14px; height: 22px; border-width: 1.2px; }
            .mouse::before { height: 5px; width: 2px; bottom: 4px; }
            .scroll-up .text { font-size: 6px; letter-spacing: 1.5px; padding: 1px 5px; }
        }
        @media (min-width: 768px) {
            .scroll-up { bottom: 10px; gap: 5px; }
            .mouse { width: 20px; height: 32px; border-width: 1.8px; }
            .mouse::before { height: 8px; width: 3.5px; bottom: 7px; }
            .scroll-up .text { font-size: 9px; padding: 2px 10px; }
        }

        /* ============ HERO (photo + typing) ============ */
        .top-section {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 80px 24px 56px;
            text-align: center;
            background:
                radial-gradient(ellipse 70% 50% at 50% -5%, rgba(192, 132, 252, 0.1) 0%, transparent 65%),
                var(--bg);
        }

        .photo-frame {
            display: flex;
            justify-content: center;
            margin: 0 0 24px 0;
        }

        .photo-frame img {
            width: 172px;
            height: 172px;
            object-fit: cover;
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.04);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.55), 0 0 0 6px rgba(192, 132, 252, 0.08);
            transition: transform 0.4s cubic-bezier(0.22, 0.68, 0, 1.2), box-shadow 0.4s;
        }

        .photo-frame img:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 56px rgba(0, 0, 0, 0.6), 0 0 0 8px rgba(192, 132, 252, 0.14);
        }

        .hero-title {
            font-family: 'Playfair Display', Georgia, serif;
            font-weight: 700;
            font-size: clamp(44px, 8vw, 76px);
            line-height: 1.08;
            letter-spacing: -0.5px;
            color: #f0ecff;
            margin-bottom: 8px;
        }

        .hero-typing-row {
            font-family: 'DM Serif Display', Georgia, serif;
            font-style: italic;
            font-size: clamp(34px, 6vw, 60px);
            line-height: 1.15;
            color: var(--pink);
            text-shadow: 0 0 40px rgba(255, 107, 157, 0.22);
            margin-bottom: 12px;
            min-height: 1.3em;
        }

        .cursor {
            font-style: normal;
            font-family: 'Inter', sans-serif;
            color: var(--pink);
            animation: blink 0.8s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        .greeting-sub {
            font-family: 'Inter', sans-serif;
            font-size: clamp(15px, 2vw, 19px);
            font-weight: 300;
            color: var(--muted);
            letter-spacing: 0.02em;
            margin-top: 4px;
        }

        .scroll-down {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            opacity: 0.7;
            transition: opacity 0.3s;
            cursor: pointer;
            user-select: none;
        }
        .scroll-down:hover {
            opacity: 1;
        }
        .scroll-down .mouse-down {
            border-color: var(--accent);
            box-shadow: 0 0 12px rgba(192, 132, 252, 0.25);
        }
        .scroll-down .mouse-down::before {
            background: var(--accent);
            box-shadow: 0 0 6px var(--accent);
            bottom: auto;
            top: 6px;
            animation: wheelDown 1.6s infinite;
        }
        .scroll-down .text {
            position: static;
            color: var(--accent);
            font-size: 9px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 400;
            background: none;
            padding: 0;
            white-space: nowrap;
        }
        @keyframes wheelDown {
            0%   { opacity: 1; transform: translate(-50%, 0); }
            70%  { opacity: 0; transform: translate(-50%, 12px); }
            100% { opacity: 0; transform: translate(-50%, 12px); }
        }

        /* ============ TIMELINE ============ */
        .tl-wrap {
            max-width: 1000px;
            margin: 0 auto;
            padding: 64px 24px 140px;
        }

        .spine { position: relative; }

        .spine-track {
            position: absolute;
            left: 50%;
            width: var(--track);
            background: var(--border);
            transform: translateX(-50%);
            border-radius: 2px;
        }

        .spine-fill {
            position: absolute;
            left: 50%;
            width: var(--track);
            height: 0;
            background: linear-gradient(to bottom, var(--accent), var(--accent2));
            transform: translateX(-50%);
            box-shadow: 0 0 8px 2px rgba(192, 132, 252, 0.5);
            transition: height 0.03s linear;
            border-radius: 2px;
        }

        .tl-item {
            display: grid;
            grid-template-columns: 1fr 56px 1fr;
            align-items: start;
            padding: 40px 0;
        }

        .tl-item.l .card-wrap { grid-column: 1; }
        .tl-item.l .node-col  { grid-column: 2; }
        .tl-item.l .spacer    { grid-column: 3; }
        .tl-item.r .spacer    { grid-column: 1; }
        .tl-item.r .node-col  { grid-column: 2; }
        .tl-item.r .card-wrap { grid-column: 3; }

        .card-wrap {
            --prog: 0;
            opacity: var(--prog);
            transform:
                translateX(calc(var(--dir, -1) * (1 - var(--prog)) * 60px))
                translateY(calc((1 - var(--prog)) * 20px));
            will-change: transform, opacity;
        }

        .tl-item.r .card-wrap { --dir: 1; }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--r);
            overflow: hidden;
            position: relative;
            aspect-ratio: 16 / 10;
            transition: border-color 0.3s, box-shadow 0.3s, transform 0.35s cubic-bezier(0.22, 0.68, 0, 1.2);
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--r);
            opacity: 0;
            background: linear-gradient(135deg, rgba(192, 132, 252, 0.07), rgba(233, 168, 240, 0.04));
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 2;
        }

        .card:hover {
            border-color: rgba(192, 132, 252, 0.45);
            box-shadow: 0 0 0 1px rgba(192, 132, 252, 0.12), 0 24px 56px rgba(0, 0, 0, 0.6);
            transform: translateY(-5px) scale(1.01);
        }

        .card:hover::before { opacity: 1; }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: saturate(0.75) brightness(0.85);
        }

        .year-badge {
            position: absolute;
            top: 14px;
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: 0.3px;
            color: #f0ecff;
            background: rgba(26, 16, 40, 0.72);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            padding: 5px 18px 7px;
            border-radius: 40px;
            border: 1px solid rgba(192, 132, 252, 0.28);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.5);
            z-index: 3;
            pointer-events: none;
        }

        .tl-item.l .year-badge { right: 14px; }
        .tl-item.r .year-badge { left: 14px; }

        .node-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 32px;
            position: relative;
            z-index: 2;
        }

        .node {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--bg);
            border: 2px solid var(--border);
            position: relative;
            transition: border-color 0.4s, box-shadow 0.4s;
        }

        .node.lit {
            border-color: var(--accent);
            box-shadow: 0 0 0 5px rgba(192, 132, 252, 0.15), 0 0 14px 3px rgba(192, 132, 252, 0.35);
        }

        .node.lit::after {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 1px solid var(--accent);
            animation: ripple 1.6s ease-out infinite;
        }

        @keyframes ripple {
            0%   { opacity: 0.6; transform: scale(0.5); }
            100% { opacity: 0;  transform: scale(1.8); }
        }

        .spacer { display: block; }

        .tl-end {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            opacity: 0;
            transform: translateY(28px);
            transition: opacity 0.9s, transform 0.9s;
        }

        .tl-end.vis { opacity: 1; transform: translateY(0); }

        .end-glow {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            box-shadow: 0 0 20px 6px rgba(192, 132, 252, 0.5);
            margin-bottom: 24px;
        }

        .tl-end p {
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--muted);
        }

        @media (max-width: 640px) {
            .spine-track,
            .spine-fill {
                left: 24px;
                transform: none;
            }

            .tl-item {
                grid-template-columns: 48px 1fr;
                grid-template-rows: auto;
            }

            .tl-item.l .card-wrap,
            .tl-item.r .card-wrap {
                grid-column: 2;
                grid-row: 1;
            }

            .tl-item.l .node-col,
            .tl-item.r .node-col {
                grid-column: 1;
                grid-row: 1;
            }

            .spacer { display: none; }
            .tl-item.r .card-wrap { --dir: -1; }

            .card { aspect-ratio: 16 / 11; }

            .year-badge {
                font-size: 1rem;
                padding: 4px 14px 6px;
                top: 12px;
            }
            .tl-item.l .year-badge { right: 12px; }
            .tl-item.r .year-badge { left: 12px; }

            .photo-frame img {
                width: 140px;
                height: 140px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .card-wrap { opacity: 1 !important; transform: none !important; }
            .node { border-color: var(--accent); }
            .node.lit::after { animation: none; }
        }
    </style>
</head>
<body>

    <!-- ============ ROCKET INTRO ============ -->
    <section class="rocket-section" id="rocketSection">
        <canvas id="c"></canvas>
        <div class="scroll-up" id="scrollHint">
            <div class="mouse"></div>
            <div class="text">SCROLL UP</div>
        </div>
    </section>

    <!-- ============ SECOND PAGE (hidden until scroll trigger) ============ -->
    <div class="page-content" id="pageTwo">

        <!-- HERO (photo + typing) -->
        <section class="top-section">
            <div class="photo-frame">
                <img src="photo.jpg" alt="Birthday Photo" onerror="this.style.display='none'">
            </div>

            <h1 class="hero-title">Happy Birthday</h1>

            <p class="hero-typing-row">
                <span id="typing"></span><span class="cursor">|</span>
            </p>

            <p class="greeting-sub">Wishing You Happiness, Success &amp; Good Health</p>

            <div class="scroll-down">
                <div class="mouse mouse-down"></div>
                <div class="text">SCROLL DOWN</div>
            </div>
        </section>

        <!-- TIMELINE -->
        <div class="tl-wrap">
            <div class="spine" id="spine">

                <div class="spine-track" id="spineTrack"></div>
                <div class="spine-fill" id="spineFill"></div>

                <div class="tl-item l">
                    <div class="card-wrap" id="cw0">
                        <div class="card">
                            <img class="card-img" src="photos/2020.jpg" alt="2020" loading="lazy"
                                 onerror="this.src='https://picsum.photos/seed/bd2020/600/400'">
                            <div class="year-badge">2020</div>
                        </div>
                    </div>
                    <div class="node-col"><div class="node" id="nd0"></div></div>
                    <div class="spacer"></div>
                </div>

                <div class="tl-item r">
                    <div class="spacer"></div>
                    <div class="node-col"><div class="node" id="nd1"></div></div>
                    <div class="card-wrap" id="cw1">
                        <div class="card">
                            <img class="card-img" src="photos/2021.jpg" alt="2021" loading="lazy"
                                 onerror="this.src='https://picsum.photos/seed/bd2021/600/400'">
                            <div class="year-badge">2021</div>
                        </div>
                    </div>
                </div>

                <div class="tl-item l">
                    <div class="card-wrap" id="cw2">
                        <div class="card">
                            <img class="card-img" src="photos/2022.jpg" alt="2022" loading="lazy"
                                 onerror="this.src='https://picsum.photos/seed/bd2022/600/400'">
                            <div class="year-badge">2022</div>
                        </div>
                    </div>
                    <div class="node-col"><div class="node" id="nd2"></div></div>
                    <div class="spacer"></div>
                </div>

                <div class="tl-item r">
                    <div class="spacer"></div>
                    <div class="node-col"><div class="node" id="nd3"></div></div>
                    <div class="card-wrap" id="cw3">
                        <div class="card">
                            <img class="card-img" src="photos/2023.jpg" alt="2023" loading="lazy"
                                 onerror="this.src='https://picsum.photos/seed/bd2023/600/400'">
                            <div class="year-badge">2023</div>
                        </div>
                    </div>
                </div>

                <div class="tl-item l">
                    <div class="card-wrap" id="cw4">
                        <div class="card">
                            <img class="card-img" src="photos/2024.jpg" alt="2024" loading="lazy"
                                 onerror="this.src='https://picsum.photos/seed/bd2024/600/400'">
                            <div class="year-badge">2024</div>
                        </div>
                    </div>
                    <div class="node-col"><div class="node" id="nd4"></div></div>
                    <div class="spacer"></div>
                </div>

                <div class="tl-end" id="tlEnd">
                    <div class="end-glow"></div>
                    <p>Cheers to many more 🥂</p>
                </div>

            </div>
        </div>

    </div>

    <!-- ============ ROCKET ANIMATION SCRIPT ============ -->
    <script>
        (function() {
            const canvas = document.getElementById('c');
            const ctx = canvas.getContext('2d');
            const section = document.getElementById('rocketSection');

            let W, H, DPR;

            function resize() {
                DPR = Math.min(window.devicePixelRatio || 1, 2);
                const rect = section.getBoundingClientRect();
                W = rect.width;
                H = rect.height;
                canvas.width = W * DPR;
                canvas.height = H * DPR;
                ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
            }
            resize();

            const COLORS = [
                '#ff5fa2', '#ffd23f', '#3fd6ff', '#7a5cff',
                '#5cff8f', '#ff7a3f', '#ff5f5f', '#9bdcff',
                '#c98bff', '#ffe28a'
            ];

            function pickColor(i) { return COLORS[i % COLORS.length]; }

            const LINE1 = "HAPPY";
            const LINE2 = "BIRTHDAY!";
            let letters = [];
            let particles = [];

            let bgStars = [];
            let glowPoints = [];

            let LAUNCH_X = 0;
            let LAUNCH_Y = 0;

            class Letter {
                constructor(ch, color, fontSize, tx, ty) {
                    this.ch = ch;
                    this.color = color;
                    this._fontSize = fontSize;
                    this.fontSize = fontSize;
                    this._tx = tx;
                    this._ty = ty;
                    this.tx = tx;
                    this.ty = ty;
                    this.launchDelay = 0.1 + Math.random() * 0.45;
                    this.launchDuration = 0.55 + Math.random() * 0.3;
                    this.reset();
                }

                reset() {
                    this.state = 'launching';
                    this.t = 0;
                    this.x = LAUNCH_X;
                    this.y = LAUNCH_Y;
                    this.opacity = 0;
                    this.burstDone = false;
                    this.burstTime = 0;
                    this.driftX = (Math.random() - 0.5) * 2;
                    this.driftY = (Math.random() - 0.5) * 2;
                }

                update(dt, time) {
                    if (this.state === 'gone') return false;
                    const delay = this.launchDelay;
                    const dur = this.launchDuration;

                    if (time < delay) {
                        this.opacity = 0;
                        this.x = LAUNCH_X + this.driftX * 0.5;
                        this.y = LAUNCH_Y + this.driftY * 0.5;
                        return false;
                    }

                    const localT = time - delay;

                    if (localT < dur) {
                        const progress = Math.min(1, localT / dur);
                        const ease = 1 - Math.pow(1 - progress, 3);
                        this.x = LAUNCH_X + (this.tx - LAUNCH_X) * ease + this.driftX * 0.3 * (1 - ease);
                        this.y = LAUNCH_Y + (this.ty - LAUNCH_Y) * ease + this.driftY * 0.3 * (1 - ease);
                        this.opacity = Math.min(1, localT / (dur * 0.4));
                        if (Math.random() < 0.55) {
                            spawnTrailParticle(this.x, this.y + this.fontSize * 0.3, this.color);
                        }
                        this.burstDone = false;
                        return false;
                    }

                    if (!this.burstDone) {
                        this.burstDone = true;
                        this.burstTime = time;
                        spawnBurst(this.tx, this.ty, this.color);
                    }
                    this.x = this.tx + this.driftX * 0.1;
                    this.y = this.ty + this.driftY * 0.1;
                    this.opacity = 1;
                    return true;
                }

                draw(time) {
                    if (this.opacity <= 0.01) return;
                    ctx.save();
                    ctx.globalAlpha = this.opacity;

                    if (this.burstDone) {
                        const age = time - this.burstTime;
                        if (age >= 0 && age < 0.3) {
                            const k = age / 0.3;
                            const ringAlpha = (1 - k) * 0.9 * this.opacity;
                            ctx.globalAlpha = ringAlpha;
                            ctx.fillStyle = '#ffffff';
                            ctx.beginPath();
                            ctx.arc(this.x, this.y, this.fontSize * 0.8 * (0.2 + k * 1.2), 0, Math.PI * 2);
                            ctx.fill();
                            ctx.globalAlpha = this.opacity;
                        }
                    }

                    ctx.shadowColor = this.color;
                    ctx.shadowBlur = this.fontSize * 0.4;
                    ctx.fillStyle = this.color;
                    ctx.font = `600 ${this.fontSize}px 'Montserrat', 'Helvetica Neue', Arial, sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(this.ch, this.x, this.y);
                    ctx.shadowBlur = 0;
                    ctx.restore();
                }
            }

            function layout() {
                const sizeFactor = Math.min(W, H);
                let baseFont;
                if (sizeFactor < 380) baseFont = 22;
                else if (sizeFactor < 420) baseFont = 26;
                else if (sizeFactor < 600) baseFont = 30;
                else if (sizeFactor < 800) baseFont = 36;
                else baseFont = 42;
                baseFont = Math.max(18, Math.min(baseFont, Math.min(W, H) * 0.07));

                const letterSpacing = baseFont * 0.9;
                const lineGap = baseFont * 1.3;

                LAUNCH_X = W / 2;
                LAUNCH_Y = H + 20;

                const lines = [LINE1, LINE2];
                let centerY;
                if (H < 500) centerY = H * 0.42;
                else if (H < 700) centerY = H * 0.44;
                else centerY = H * 0.45;

                let newLetters = [];
                let idx = 0;

                lines.forEach((line, li) => {
                    const chars = line.split('');
                    const totalWidth = (chars.length - 1) * letterSpacing;
                    const startX = W / 2 - totalWidth / 2;

                    chars.forEach((ch, ci) => {
                        if (ch === ' ') return;
                        const color = pickColor(idx);
                        const tx = startX + ci * letterSpacing;
                        const ty = centerY + (li - 0.5) * lineGap;
                        const letter = new Letter(ch, color, baseFont, tx, ty);
                        const existing = letters.find(l => l.ch === ch && Math.abs(l._tx - tx) < 0.1 && Math.abs(l._ty - ty) < 0.1);
                        if (existing) {
                            letter.launchDelay = existing.launchDelay;
                            letter.launchDuration = existing.launchDuration;
                            letter.driftX = existing.driftX;
                            letter.driftY = existing.driftY;
                            letter.x = existing.x;
                            letter.y = existing.y;
                            letter.opacity = existing.opacity;
                            letter.burstDone = existing.burstDone;
                            letter.burstTime = existing.burstTime;
                            letter.state = existing.state;
                            letter.t = existing.t;
                        }
                        newLetters.push(letter);
                        idx++;
                    });
                });

                letters = newLetters;
            }

            function initBackground() {
                bgStars = [];
                const starCount = Math.floor((W * H) / 4000);
                for (let i = 0; i < starCount; i++) {
                    bgStars.push({
                        x: Math.random() * W,
                        y: Math.random() * H,
                        r: Math.random() * 2.0 + 0.2,
                        phase: Math.random() * Math.PI * 2,
                        speed: 0.2 + Math.random() * 1.6,
                        brightness: 0.3 + Math.random() * 0.7,
                        isLarge: Math.random() > 0.85
                    });
                }

                glowPoints = [];
                const glowCount = Math.max(3, Math.floor(Math.min(W, H) / 200));
                for (let i = 0; i < glowCount; i++) {
                    glowPoints.push({
                        x: Math.random() * W,
                        y: Math.random() * H,
                        radius: 80 + Math.random() * 200,
                        intensity: 0.02 + Math.random() * 0.03,
                        phase: Math.random() * Math.PI * 2,
                        speed: 0.05 + Math.random() * 0.1,
                        dx: (Math.random() - 0.5) * 6,
                        dy: (Math.random() - 0.5) * 6
                    });
                }
            }

            function drawBackground(time) {
                const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W, H) * 0.8);
                grad.addColorStop(0, '#121218');
                grad.addColorStop(0.4, '#0c0c10');
                grad.addColorStop(0.7, '#08080a');
                grad.addColorStop(1, '#040405');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, W, H);

                for (const g of glowPoints) {
                    const pulse = 0.8 + 0.2 * Math.sin(time * g.speed + g.phase);
                    const r = g.radius * pulse;
                    const alpha = g.intensity * (0.7 + 0.3 * Math.sin(time * g.speed * 0.7 + g.phase));
                    const grd = ctx.createRadialGradient(g.x, g.y, 0, g.x, g.y, r);
                    grd.addColorStop(0, `rgba(180, 190, 220, ${alpha * 0.6})`);
                    grd.addColorStop(0.5, `rgba(120, 140, 180, ${alpha * 0.3})`);
                    grd.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = grd;
                    ctx.beginPath();
                    ctx.arc(g.x, g.y, r, 0, Math.PI * 2);
                    ctx.fill();

                    g.x += g.dx * 0.002;
                    g.y += g.dy * 0.002;
                    if (g.x < -r) g.x = W + r;
                    if (g.x > W + r) g.x = -r;
                    if (g.y < -r) g.y = H + r;
                    if (g.y > H + r) g.y = -r;
                }

                for (const s of bgStars) {
                    const tw = 0.5 + 0.5 * Math.sin(time * s.speed + s.phase);
                    const alpha = 0.15 + tw * 0.65 * s.brightness;
                    ctx.globalAlpha = alpha;

                    if (s.isLarge) {
                        const grd = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r * 3);
                        grd.addColorStop(0, `rgba(255,255,255,${alpha * 0.5})`);
                        grd.addColorStop(0.3, `rgba(200,210,240,${alpha * 0.2})`);
                        grd.addColorStop(1, 'rgba(0,0,0,0)');
                        ctx.fillStyle = grd;
                        ctx.beginPath();
                        ctx.arc(s.x, s.y, s.r * 3, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    ctx.fillStyle = '#ffffff';
                    ctx.shadowColor = 'rgba(180, 190, 220, 0.3)';
                    ctx.shadowBlur = s.isLarge ? 8 : 2;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
                ctx.globalAlpha = 1;
            }

            function spawnTrailParticle(x, y, color) {
                particles.push({
                    type: 'trail', x, y,
                    vx: (Math.random() - 0.5) * 5,
                    vy: Math.random() * 18 + 8,
                    life: 0,
                    maxLife: 0.3 + Math.random() * 0.35,
                    color,
                    size: Math.random() * 1.6 + 0.5
                });
            }

            function spawnBurst(x, y, color) {
                const n = 16 + Math.floor(Math.random() * 14);
                for (let i = 0; i < n; i++) {
                    const ang = Math.random() * Math.PI * 2;
                    const speed = 25 + Math.random() * 80;
                    particles.push({
                        type: 'spark', x, y,
                        vx: Math.cos(ang) * speed,
                        vy: Math.sin(ang) * speed - 12,
                        life: 0,
                        maxLife: 0.5 + Math.random() * 0.6,
                        color,
                        size: Math.random() * 2.2 + 0.6,
                        grav: 45
                    });
                }
                for (let i = 0; i < 6; i++) {
                    const ang = Math.random() * Math.PI * 2;
                    const speed = 10 + Math.random() * 30;
                    particles.push({
                        type: 'spark', x, y,
                        vx: Math.cos(ang) * speed,
                        vy: Math.sin(ang) * speed - 8,
                        life: 0,
                        maxLife: 0.2 + Math.random() * 0.2,
                        color: '#ffffff',
                        size: Math.random() * 1.8 + 1.2,
                        grav: 20
                    });
                }
            }

            function updateParticles(dt) {
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.life += dt;
                    if (p.life >= p.maxLife) {
                        particles.splice(i, 1);
                        continue;
                    }
                    if (p.grav) p.vy += p.grav * dt;
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;
                    p.vx *= 0.99;
                    p.vy *= 0.99;
                }
            }

            function drawParticles() {
                for (const p of particles) {
                    const k = 1 - p.life / p.maxLife;
                    ctx.globalAlpha = Math.max(0, k * 0.95);
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * (0.4 + 0.6 * k), 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
            }

            let sceneTime = 0;
            let lastTs = null;
            const HOLD_DURATION = 2.8;

            function maxSettleTime() {
                let m = 0;
                for (const L of letters) m = Math.max(m, L.launchDelay + L.launchDuration);
                return m;
            }

            function recycleLetters() {
                letters.forEach(L => {
                    L.launchDelay = 0.1 + Math.random() * 0.45;
                    L.launchDuration = 0.55 + Math.random() * 0.3;
                    L.reset();
                });
                particles = [];
            }

            function frame(ts) {
                if (lastTs === null) lastTs = ts;
                const dt = Math.min(0.05, (ts - lastTs) / 1000);
                lastTs = ts;
                sceneTime += dt;

                const settleEnd = maxSettleTime() + HOLD_DURATION;
                if (sceneTime > settleEnd) {
                    recycleLetters();
                    sceneTime = 0;
                }

                const starTime = performance.now() / 1000;
                drawBackground(starTime);
                updateParticles(dt);

                for (const L of letters) L.update(dt, sceneTime);

                drawParticles();

                for (const L of letters) L.draw(sceneTime);

                requestAnimationFrame(frame);
            }

            let started = false;
            function startOnce() {
                if (started) return;
                started = true;
                layout();
                initBackground();
                letters.forEach(L => L.reset());
                particles = [];
                sceneTime = 0;
                lastTs = null;
                requestAnimationFrame(frame);
            }

            if (document.fonts && document.fonts.load) {
                document.fonts.load("600 20px 'Montserrat'").then(startOnce).catch(() => startOnce());
                setTimeout(startOnce, 500);
            } else {
                startOnce();
            }

            window.addEventListener('resize', () => {
                resize();
                layout();
                initBackground();
                letters.forEach(l => {
                    l.tx = l._tx;
                    l.ty = l._ty;
                    l.fontSize = l._fontSize;
                });
            });

            // any scroll gesture (wheel, touch, or tapping the hint) instantly reveals page two
            let revealed = false;
            let transitioning = false;
            const LOCK_MS = 650;

            function revealPageTwo() {
                if (revealed || transitioning) return;
                revealed = true;
                transitioning = true;

                document.getElementById('rocketSection').classList.add('hidden');
                const pageTwo = document.getElementById('pageTwo');
                pageTwo.classList.add('shown');
                document.body.classList.add('unlocked');
                window.scrollTo(0, 0);

                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        pageTwo.classList.add('entered');
                        window.dispatchEvent(new Event('resize'));
                    });
                });

                setTimeout(() => { transitioning = false; }, LOCK_MS);
            }

            function revealRocket() {
                if (!revealed || transitioning) return;
                revealed = false;
                transitioning = true;

                const pageTwo = document.getElementById('pageTwo');
                pageTwo.classList.remove('entered');
                document.getElementById('rocketSection').classList.remove('hidden');

                setTimeout(() => {
                    pageTwo.classList.remove('shown');
                    document.body.classList.remove('unlocked');
                    transitioning = false;
                }, 350);
            }

            window.addEventListener('wheel', (e) => {
                if (e.deltaY > 0) {
                    if (!revealed) revealPageTwo();
                    return;
                }
                if (e.deltaY < 0) {
                    if (revealed && window.scrollY > 0) {
                        e.preventDefault();
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    } else if (revealed && window.scrollY <= 0) {
                        revealRocket();
                    }
                }
            }, { passive: false });

            document.getElementById('scrollHint').addEventListener('click', revealPageTwo);

            let touchStartY = null;

            window.addEventListener('touchstart', (e) => {
                touchStartY = e.touches[0].clientY;
            }, { passive: true });

            window.addEventListener('touchmove', (e) => {
                if (touchStartY === null) return;
                const dy = touchStartY - e.touches[0].clientY;

                if (!revealed && dy > 24) {
                    revealPageTwo();
                    return;
                }
                if (revealed && dy < -24) {
                    if (window.scrollY > 0) {
                        e.preventDefault();
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    } else {
                        revealRocket();
                    }
                }
            }, { passive: false });
        })();
    </script>

    <!-- ============ TYPING EFFECT SCRIPT ============ -->
    <script>
        (function() {
            const phrases = [
                'Sudip Bisui',
                'My Dear Friend',
                'Have a Great Day',
                'Enjoy Your Birthday'
            ];

            const el = document.getElementById('typing');
            let pi = 0, ci = 0, del = false;

            function tick() {
                const phrase = phrases[pi];

                if (!del) {
                    el.textContent = phrase.slice(0, ++ci);
                    if (ci === phrase.length) { del = true; return setTimeout(tick, 1600); }
                } else {
                    el.textContent = phrase.slice(0, --ci);
                    if (ci === 0) { del = false; pi = (pi + 1) % phrases.length; }
                }

                setTimeout(tick, del ? 48 : 95);
            }

            tick();
        })();
    </script>

    <!-- ============ TIMELINE SCROLL SCRIPT ============ -->
    <script>
        (function() {
            const spineTrack = document.getElementById('spineTrack');
            const spineFill = document.getElementById('spineFill');
            const spine = document.getElementById('spine');
            const tlEnd = document.getElementById('tlEnd');
            const cardWraps = [0, 1, 2, 3, 4].map(i => document.getElementById('cw' + i));
            const nodes = [0, 1, 2, 3, 4].map(i => document.getElementById('nd' + i));

            const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));
            const remap = (v, a, b, c, d) => c + (d - c) * clamp((v - a) / (b - a), 0, 1);

            let offsets = [], spineTop = 0, lastOff = 0;

            function measure() {
                const r = spine.getBoundingClientRect();
                spineTop = window.scrollY + r.top;

                offsets = nodes.map(nd => {
                    const nr = nd.getBoundingClientRect();
                    return (window.scrollY + nr.top + nd.offsetHeight / 2) - spineTop;
                });

                lastOff = offsets[offsets.length - 1] || 0;
                spineTrack.style.top = '0px';
                spineTrack.style.height = lastOff + 'px';
                spineFill.style.top = '0px';
            }

            function onScroll() {
                const sy = window.scrollY;
                const vh = window.innerHeight;

                const fill = clamp(sy + vh * 0.6 - spineTop, 0, lastOff);
                spineFill.style.height = fill.toFixed(2) + 'px';

                offsets.forEach((o, i) => nodes[i].classList.toggle('lit', fill >= o - 2));

                cardWraps.forEach(cw => {
                    if (!cw) return;
                    const mid = cw.getBoundingClientRect();
                    const prog = remap(mid.top + mid.height / 2, vh, vh * 0.35, 0, 1);
                    cw.style.setProperty('--prog', prog.toFixed(4));
                });

                tlEnd.classList.toggle('vis', tlEnd.getBoundingClientRect().top < vh * 0.85);
            }

            const scrollDownHint = document.querySelector('.scroll-down');
            if (scrollDownHint) {
                scrollDownHint.addEventListener('click', () => {
                    document.querySelector('.tl-wrap').scrollIntoView({ behavior: 'smooth' });
                });
            }

            measure();
            onScroll();

            window.addEventListener('resize', () => { measure(); onScroll(); }, { passive: true });
            window.addEventListener('load', () => { measure(); onScroll(); });
            window.addEventListener('scroll', onScroll, { passive: true });
        })();
    </script>
